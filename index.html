<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeWatching</title>
    
    <!-- Mapbox GL JS CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="global.css" />
    
    <!-- Map CSS -->
    <link rel="stylesheet" href="map.css" />
    
    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    
    <!-- Mapbox GL JS as ES module -->
    <script src="map.js" type="module"></script>
</head>
<body>
    <header class="main-header">
        <h1>🚴🏼‍♀️ BikeWatching</h1>
        <label class="time-filter-label">
            Filter by time:
            <input type="range" id="time-slider" min="-1" max="1440" value="-1">
            <span class="time-display">
                <time id="selected-time"></time>
                <em id="any-time">(any time)</em>
            </span>
        </label>
    </header>
    
    <p>Track and visualize real-time bike station availability to help commuters find available bikes and docks near them.</p>
    
    <!-- Map container with SVG overlay -->
    <div id="map">
        <svg></svg>
    </div>
    
    <!-- Step 6.2: Legend for traffic flow -->
    <div class="legend">
        <div style="--departure-ratio: 1">More departures</div>
        <div style="--departure-ratio: 0.5">Balanced</div>
        <div style="--departure-ratio: 0">More arrivals</div>
    </div>
</body>
</html>
